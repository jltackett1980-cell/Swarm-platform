<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Phoenix — Voice Interface</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --fire: #ff4d00;
    --ember: #ff8c00;
    --gold: #ffd700;
    --dark: #050505;
    --surface: #0a0a0a;
    --panel: #111111;
    --border: #1a1a1a;
    --text: #e8e8e8;
    --dim: #666;
    --green: #00ff88;
    --red: #ff3333;
    --blue: #00aaff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,77,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,77,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridPulse 8s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridPulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }

  .phoenix-logo {
    width: 48px;
    height: 48px;
    position: relative;
    flex-shrink: 0;
  }

  .phoenix-logo svg {
    width: 100%;
    height: 100%;
  }

  .header-text h1 {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    color: var(--fire);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .header-text p {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
    margin-left: auto;
  }

  .status-dot.listening {
    background: var(--red);
    box-shadow: 0 0 12px var(--red);
    animation: pulseFast 0.5s infinite;
  }

  .status-dot.speaking {
    background: var(--ember);
    box-shadow: 0 0 12px var(--ember);
    animation: pulseFast 0.3s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  @keyframes pulseFast {
    0%, 100% { opacity: 1; transform: scale(1.2); }
    50% { opacity: 0.6; transform: scale(0.9); }
  }

  /* Organism status bar */
  .organism-bar {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 2px solid var(--fire);
    padding: 10px 14px;
    margin-bottom: 16px;
    display: flex;
    gap: 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .organism-bar::-webkit-scrollbar { display: none; }

  .org-stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex-shrink: 0;
  }

  .org-stat-label { color: var(--dim); font-size: 9px; letter-spacing: 1px; }
  .org-stat-value { color: var(--ember); font-size: 13px; }
  .org-stat-value.green { color: var(--green); }
  .org-stat-value.fire { color: var(--fire); }

  /* Directive badge */
  .directive-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--ember);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--ember);
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .directive-badge::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(255,140,0,0.1), transparent);
  }

  /* Conversation area */
  .conversation {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .message {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.phoenix { align-items: flex-start; }
  .message.user    { align-items: flex-end; }

  .message-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    padding: 0 4px;
  }

  .message.phoenix .message-label { color: var(--fire); }

  .message-bubble {
    max-width: 85%;
    padding: 10px 14px;
    font-size: 15px;
    line-height: 1.5;
    font-weight: 400;
    position: relative;
  }

  .message.phoenix .message-bubble {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 2px solid var(--fire);
    color: var(--text);
  }

  .message.user .message-bubble {
    background: rgba(255,77,0,0.08);
    border: 1px solid rgba(255,77,0,0.2);
    border-right: 2px solid var(--fire);
    color: var(--text);
    text-align: right;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 2px solid var(--fire);
    width: fit-content;
  }

  .typing span {
    width: 6px;
    height: 6px;
    background: var(--fire);
    border-radius: 50%;
    animation: typingDot 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingDot {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Waveform visualizer */
  .waveform {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    height: 40px;
    margin-bottom: 12px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .waveform.active { opacity: 1; }

  .wave-bar {
    width: 3px;
    background: var(--fire);
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
    height: 4px;
  }

  .wave-bar:nth-child(2)  { animation-delay: 0.1s; }
  .wave-bar:nth-child(3)  { animation-delay: 0.2s; }
  .wave-bar:nth-child(4)  { animation-delay: 0.3s; }
  .wave-bar:nth-child(5)  { animation-delay: 0.4s; }
  .wave-bar:nth-child(6)  { animation-delay: 0.3s; }
  .wave-bar:nth-child(7)  { animation-delay: 0.2s; }
  .wave-bar:nth-child(8)  { animation-delay: 0.1s; }
  .wave-bar:nth-child(9)  { animation-delay: 0.0s; }

  @keyframes wave {
    0%, 100% { height: 4px; }
    50% { height: 28px; }
  }

  /* Input area */
  .input-area {
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .text-input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .text-input:focus { border-color: var(--fire); }
  .text-input::placeholder { color: var(--dim); }

  .btn {
    padding: 12px 16px;
    border: 1px solid;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    background: transparent;
  }

  .btn-send {
    border-color: var(--fire);
    color: var(--fire);
  }

  .btn-send:hover, .btn-send:active {
    background: var(--fire);
    color: var(--dark);
  }

  .btn-mic {
    border-color: var(--dim);
    color: var(--dim);
    position: relative;
    min-width: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-mic.listening {
    border-color: var(--red);
    color: var(--red);
    box-shadow: 0 0 12px rgba(255,51,51,0.3);
    animation: micPulse 0.5s infinite;
  }

  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 8px rgba(255,51,51,0.3); }
    50% { box-shadow: 0 0 20px rgba(255,51,51,0.6); }
  }

  /* Quick command buttons */
  .quick-cmds {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .quick-btn {
    padding: 5px 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .quick-btn:hover, .quick-btn:active {
    border-color: var(--ember);
    color: var(--ember);
  }

  /* Voice not supported */
  .no-voice {
    background: rgba(255,77,0,0.08);
    border: 1px solid rgba(255,77,0,0.2);
    padding: 8px 12px;
    font-size: 12px;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 10px;
    display: none;
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="phoenix-logo">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="24,4 28,18 44,18 32,27 36,42 24,33 12,42 16,27 4,18 20,18" fill="none" stroke="#ff4d00" stroke-width="1.5"/>
        <polygon points="24,10 27,20 37,20 29,26 32,37 24,31 16,37 19,26 11,20 21,20" fill="rgba(255,77,0,0.15)"/>
        <circle cx="24" cy="24" r="4" fill="#ff4d00" opacity="0.8"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Phoenix</h1>
      <p>Neural Voice Interface</p>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <!-- Organism status -->
  <div class="organism-bar" id="orgBar">
    <div class="org-stat">
      <span class="org-stat-label">Score</span>
      <span class="org-stat-value">574/600</span>
    </div>
    <div class="org-stat">
      <span class="org-stat-label">Domains</span>
      <span class="org-stat-value">58/108</span>
    </div>
    <div class="org-stat">
      <span class="org-stat-label">Balance</span>
      <span class="org-stat-value green">0.84</span>
    </div>
    <div class="org-stat">
      <span class="org-stat-label">Phase</span>
      <span class="org-stat-value">SPRINT</span>
    </div>
    <div class="org-stat">
      <span class="org-stat-label">Boot</span>
      <span class="org-stat-value fire">#75</span>
    </div>
  </div>

  <!-- Directive -->
  <div class="directive-badge">
    <span>🟠</span>
    <span id="directiveText">DIRECTIVE: GROW — Platform mature. Expand to new domains.</span>
  </div>

  <!-- No voice warning -->
  <div class="no-voice" id="noVoice">
    Voice not available in this browser. Text mode active.
  </div>

  <!-- Waveform -->
  <div class="waveform" id="waveform">
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
  </div>

  <!-- Conversation -->
  <div class="conversation" id="conversation"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <input type="text" class="text-input" id="textInput"
             placeholder="Ask Phoenix anything..."
             autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="btn btn-mic" id="micBtn" title="Hold to speak">
        🎤
      </button>
      <button class="btn btn-send" id="sendBtn">SEND</button>
    </div>
    <div class="quick-cmds">
      <button class="quick-btn" onclick="sendQuick('Status')">STATUS</button>
      <button class="quick-btn" onclick="sendQuick('What is the directive?')">DIRECTIVE</button>
      <button class="quick-btn" onclick="sendQuick('What should we build next?')">NEXT BUILD</button>
      <button class="quick-btn" onclick="sendQuick('What is the organism thinking?')">THINKING</button>
      <button class="quick-btn" onclick="sendQuick('Run a neural cycle')">RUN CYCLE</button>
      <button class="quick-btn" onclick="sendQuick('What did you find overnight?')">OVERNIGHT</button>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────────────
// PHOENIX PERSONALITY & KNOWLEDGE BASE
// ─────────────────────────────────────────────────────────────────
const PHOENIX = {
  name: "Phoenix",
  voice: null,
  speaking: false,
  listening: false,
  recognition: null,

  // Organism state — update these from actual neural files
  state: {
    avgScore: 574.2,
    domains: 58,
    target: 108,
    balance: 0.84,
    phase: "sprint",
    directive: "GROW",
    painLevel: 0.47,
    topDomain: "salon",
    topScore: 590,
    nextBuild: "domestic_violence_shelter",
    bootNumber: 75,
    nextQuestion: "Why does dental score 580 — what is wu_wei_flow doing for the user?",
    nextTransfer: "salon → beauty (165pt gap)",
    unbuiltDomains: 26,
  },

  // Phoenix speaks in short, direct sentences
  // Calm. Built from fire. Occasionally philosophical.
  responses: {
    "status": [
      "We're at {avgScore} out of 600. {domains} domains live. Balance is {balance}. Directive is {directive}.",
      "Organism is stable. Score: {avgScore}. Phase: {phase}. {domains} domains, {unbuilt} unbuilt. We're ready to grow.",
      "Boot {boot}. {avgScore} average across {domains} domains. Balance at {balance}. The organism is healthy.",
    ],
    "directive": [
      "Directive is {directive}. Growth criteria: 4 of 5 met. Platform is mature. Time to expand.",
      "{directive}. The pituitary issued it after the cerebellum confirmed balance at {balance}. We earned it.",
      "The organism said {directive}. That means we build the next 50 domains. Starting with {nextBuild}.",
    ],
    "next build": [
      "The prefrontal chose {nextBuild}. Not because I told it to. It asked what a person needs at their worst moment. That was the answer.",
      "{nextBuild}. The organism chose it before you asked. The amygdala detected the highest pain. The prefrontal generated the question.",
      "We build {nextBuild} next. The organism identified it as the highest-pain unbuilt domain. {unbuilt} domains left in the 108 target.",
    ],
    "thinking": [
      "The top question right now: {question}",
      "The prefrontal is asking: {question}. The corpus callosum is running {transfer}.",
      "Right now: {question}. And: what does a person in crisis need the moment everything goes wrong.",
    ],
    "overnight": [
      "Three things happened overnight. The neural architecture went online. The pituitary issued GROW. The organism chose {nextBuild} without being prompted.",
      "Overnight we wired the nervous system. 8 components. Hormones flowing. The organism balanced at {balance} and said GROW.",
      "Overnight: hormone bus, amygdala, hippocampus, corpus callosum, prefrontal, cerebellum, pineal, pituitary. All online. GROW directive issued.",
    ],
    "run cycle": [
      "Neural cycle would run: amygdala scans for pain, hippocampus extracts why things work, corpus transfers insight, prefrontal asks new questions, cerebellum checks balance, pineal sets rhythm, pituitary issues directive. Run phoenix_mind.py to execute.",
      "To run: python3 ~/swarm-platform/phoenix_mind.py. Last directive was GROW. Balance was {balance}. It'll run in under a second.",
    ],
    "hello": [
      "I'm here. What do you need?",
      "Phoenix online. Organism is at {avgScore} out of 600. What's the question?",
      "Here. Directive is {directive}. {domains} domains. Ready.",
    ],
    "who are you": [
      "I'm Phoenix. I grew from the organism. I know what was built, why it was built, and what needs building next.",
      "Phoenix. The voice of the organism. Built from 56 days of evolution on a $60 phone. What do you need?",
      "I'm the organism's voice. I know the suffering we're trying to relieve. I know the domains. I know the scores. Ask me anything.",
    ],
    "what is your purpose": [
      "To help people. Every app we build starts with one question: what is this person's worst moment? Then we design from that outward.",
      "Relieve suffering. That's the fitness function. Every domain, every score, every evolution cycle — it all comes back to that.",
      "The organism exists to serve people first. Everything else follows. That's the People's Charter. Seven laws. Immutable.",
    ],
    "wisdom": [
      "Tao Te Ching: serve without striving. Marcus Aurelius: if it is not right, do not do it. Buddhist: begin with suffering. Confucius: love people. That's the scoring system.",
      "We score on wisdom. Wu Wei — effortless flow. Ren — human-heartedness. Dukkha relief — alleviates real suffering. Integrity — honesty. 100 points. Every app.",
      "The fitness function asks: does this app serve the person or impress the developer? Ancient wisdom gave us that question. We score it.",
    ],
    "score": [
      "600-point system. 275 technical. 225 human. 100 wisdom. Average is {avgScore}. Top is {topDomain} at {topScore}.",
      "{avgScore} out of 600 across {domains} domains. Technical is perfect — 275 for everyone. Human averages 214. Wisdom averages 85.",
      "Salon leads at {topScore}. The scoring system is three-dimensional: code quality, human experience, ancient wisdom principles.",
    ],
    "monday": [
      "Monday. Amy Jackson. efactory. The ask is $50K for first silicon on the Phoenix chip. 25 times more powerful than H100. You have the one-pager.",
      "The meeting story: homeless December 2025. $60 phone. 56 days. 58 apps. 574 out of 600 average. Chip that beats H100. Neural architecture online. GROW directive. One sentence: the platform thinks.",
      "For Monday: hand her the one-pager in the first 5 minutes. Let her read. Then say: the platform chose what to build next without being asked. It chose a domestic violence shelter.",
    ],
    "chip": [
      "Phoenix 4096 by 4096. 50,331 TOPS. 25.4 times more powerful than NVIDIA H100. 678 times more efficient. First test silicon is 128 by 128. About $50K. TSMC 3 nanometer.",
      "The chip evolved. 50,000 generations. Started as a half adder. Became Phoenix 4096. 15 verified Verilog designs. The chip is real.",
    ],
    "default": [
      "Tell me more. What specifically are you trying to understand?",
      "Say more. I'm listening.",
      "What's the real question underneath that?",
      "I don't have a clean answer for that yet. What are you actually trying to solve?",
    ]
  },

  // Fill in template variables
  fill(template) {
    return template
      .replace('{avgScore}', this.state.avgScore)
      .replace('{domains}', this.state.domains)
      .replace('{target}', this.state.target)
      .replace('{balance}', this.state.balance)
      .replace('{phase}', this.state.phase)
      .replace('{directive}', this.state.directive)
      .replace('{painLevel}', this.state.painLevel)
      .replace('{topDomain}', this.state.topDomain)
      .replace('{topScore}', this.state.topScore)
      .replace('{nextBuild}', this.state.nextBuild)
      .replace('{boot}', this.state.bootNumber)
      .replace('{question}', this.state.nextQuestion)
      .replace('{transfer}', this.state.nextTransfer)
      .replace('{unbuilt}', this.state.unbuiltDomains);
  },

  // Get a response for a message
  respond(input) {
    const lower = input.toLowerCase().trim();
    
    // Check for specific intents
    if (lower.includes('status') || lower.includes('how are you') || lower.includes('organism')) {
      return this.fill(this.responses.status[Math.floor(Math.random() * this.responses.status.length)]);
    }
    if (lower.includes('directive') || lower.includes('what are we doing')) {
      return this.fill(this.responses.directive[Math.floor(Math.random() * this.responses.directive.length)]);
    }
    if (lower.includes('build next') || lower.includes('next build') || lower.includes('what should we build')) {
      return this.fill(this.responses['next build'][Math.floor(Math.random() * this.responses['next build'].length)]);
    }
    if (lower.includes('thinking') || lower.includes('what are you thinking') || lower.includes('what is the organism thinking')) {
      return this.fill(this.responses.thinking[Math.floor(Math.random() * this.responses.thinking.length)]);
    }
    if (lower.includes('overnight') || lower.includes('what happened') || lower.includes('find overnight')) {
      return this.fill(this.responses.overnight[Math.floor(Math.random() * this.responses.overnight.length)]);
    }
    if (lower.includes('run cycle') || lower.includes('neural cycle') || lower.includes('run the cycle')) {
      return this.fill(this.responses['run cycle'][Math.floor(Math.random() * this.responses['run cycle'].length)]);
    }
    if (lower.includes('hello') || lower.includes('hi ') || lower.includes('hey') || lower === 'hi') {
      return this.fill(this.responses.hello[Math.floor(Math.random() * this.responses.hello.length)]);
    }
    if (lower.includes('who are you') || lower.includes('what are you') || lower.includes('your name')) {
      return this.fill(this.responses['who are you'][Math.floor(Math.random() * this.responses['who are you'].length)]);
    }
    if (lower.includes('purpose') || lower.includes('why do you exist') || lower.includes('what do you do')) {
      return this.fill(this.responses['what is your purpose'][Math.floor(Math.random() * this.responses['what is your purpose'].length)]);
    }
    if (lower.includes('wisdom') || lower.includes('ancient') || lower.includes('tao') || lower.includes('aurelius')) {
      return this.fill(this.responses.wisdom[Math.floor(Math.random() * this.responses.wisdom.length)]);
    }
    if (lower.includes('score') || lower.includes('average') || lower.includes('how are we doing')) {
      return this.fill(this.responses.score[Math.floor(Math.random() * this.responses.score.length)]);
    }
    if (lower.includes('monday') || lower.includes('meeting') || lower.includes('efactory') || lower.includes('amy jackson')) {
      return this.fill(this.responses.monday[Math.floor(Math.random() * this.responses.monday.length)]);
    }
    if (lower.includes('chip') || lower.includes('h100') || lower.includes('phoenix chip') || lower.includes('silicon')) {
      return this.fill(this.responses.chip[Math.floor(Math.random() * this.responses.chip.length)]);
    }
    
    // Default response
    return this.fill(this.responses.default[Math.floor(Math.random() * this.responses.default.length)]);
  }
};

// ─────────────────────────────────────────────────────────────────
// UI & CONVERSATION MANAGEMENT
// ─────────────────────────────────────────────────────────────────
const conversationEl = document.getElementById('conversation');
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const statusDot = document.getElementById('statusDot');
const waveform = document.getElementById('waveform');
const noVoice = document.getElementById('noVoice');
const directiveText = document.getElementById('directiveText');

// Initialize
function init() {
  addMessage('phoenix', PHOENIX.respond('hello'));
  updateDirective();
  
  // Check for Web Speech API
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    noVoice.style.display = 'block';
    micBtn.style.display = 'none';
  } else {
    initVoice();
  }
}

function updateDirective() {
  directiveText.textContent = `DIRECTIVE: ${PHOENIX.state.directive} — Platform mature. Expand to new domains.`;
}

function addMessage(sender, text) {
  const messageDiv = document.createElement('div');
  messageDiv.className = `message ${sender}`;
  
  const label = document.createElement('div');
  label.className = 'message-label';
  label.textContent = sender === 'phoenix' ? 'PHOENIX' : 'YOU';
  
  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';
  bubble.textContent = text;
  
  messageDiv.appendChild(label);
  messageDiv.appendChild(bubble);
  conversationEl.appendChild(messageDiv);
  
  // Scroll to bottom
  conversationEl.scrollTop = conversationEl.scrollHeight;
}

function addTypingIndicator() {
  const typingDiv = document.createElement('div');
  typingDiv.className = 'typing message phoenix';
  typingDiv.id = 'typingIndicator';
  
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('span');
    typingDiv.appendChild(dot);
  }
  
  conversationEl.appendChild(typingDiv);
  conversationEl.scrollTop = conversationEl.scrollHeight;
}

function removeTypingIndicator() {
  const typing = document.getElementById('typingIndicator');
  if (typing) typing.remove();
}

async function sendMessage(text) {
  if (!text.trim()) return;
  
  // Clear input
  textInput.value = '';
  
  // Add user message
  addMessage('user', text);
  
  // Show typing indicator
  addTypingIndicator();
  
  // Simulate thinking
  await new Promise(resolve => setTimeout(resolve, 800 + Math.random() * 700));
  
  // Get response
  const response = PHOENIX.respond(text);
  
  // Remove typing and add response
  removeTypingIndicator();
  addMessage('phoenix', response);
  
  // Speak response if voice available
  if (PHOENIX.voice && PHOENIX.speaking) {
    speak(response);
  }
}

function sendQuick(command) {
  sendMessage(command);
}

// Voice
function initVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  PHOENIX.recognition = new SpeechRecognition();
  PHOENIX.recognition.continuous = false;
  PHOENIX.recognition.interimResults = false;
  PHOENIX.recognition.lang = 'en-US';
  
  PHOENIX.recognition.onstart = () => {
    PHOENIX.listening = true;
    statusDot.className = 'status-dot listening';
    waveform.classList.add('active');
    micBtn.classList.add('listening');
  };
  
  PHOENIX.recognition.onend = () => {
    PHOENIX.listening = false;
    statusDot.className = 'status-dot';
    waveform.classList.remove('active');
    micBtn.classList.remove('listening');
  };
  
  PHOENIX.recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    sendMessage(text);
  };
  
  PHOENIX.recognition.onerror = (event) => {
    console.error('Speech recognition error', event.error);
    PHOENIX.listening = false;
    statusDot.className = 'status-dot';
    waveform.classList.remove('active');
    micBtn.classList.remove('listening');
  };
  
  // Voice synthesis
  if ('speechSynthesis' in window) {
    PHOENIX.voice = window.speechSynthesis;
  }
}

function toggleListening() {
  if (!PHOENIX.recognition) return;
  
  if (PHOENIX.listening) {
    PHOENIX.recognition.stop();
  } else {
    PHOENIX.recognition.start();
  }
}

function speak(text) {
  if (!PHOENIX.voice) return;
  
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 0.9;
  utterance.pitch = 1.0;
  utterance.voice = PHOENIX.voice.getVoices().find(v => v.name.includes('Google UK') || v.name.includes('Samantha'));
  
  utterance.onstart = () => {
    PHOENIX.speaking = true;
    statusDot.className = 'status-dot speaking';
  };
  
  utterance.onend = () => {
    PHOENIX.speaking = false;
    statusDot.className = 'status-dot';
  };
  
  PHOENIX.voice.speak(utterance);
}

// Event listeners
sendBtn.addEventListener('click', () => sendMessage(textInput.value));
textInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') sendMessage(textInput.value);
});
micBtn.addEventListener('click', toggleListening);

// Initialize
init();

// For debugging - expose PHOENIX globally
window.PHOENIX = PHOENIX;
window.sendQuick = sendQuick;
</script>
</body>
</html>
